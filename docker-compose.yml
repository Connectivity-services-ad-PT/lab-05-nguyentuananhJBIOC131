version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fit4110-db-lab05
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: fit4110/ai-service:v0.1.0-team-iot
    container_name: fit4110-ai-lab05
    command: uvicorn ai_service.main:app --app-dir src --host 0.0.0.0 --port 9000
    ports:
      - "9000:9000"
    networks:
      - team-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: fit4110/iot-ingestion:v0.1.0-team-iot
    container_name: fit4110-api-lab05
    command: uvicorn iot_app.main:app --app-dir src --host 0.0.0.0 --port 8000
    user: "1000:1000"
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:8000"
    networks:
      - team-internal
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  team-internal:
    driver: bridge

volumes:
  pgdata: